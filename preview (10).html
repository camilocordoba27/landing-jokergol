<section class="carousel-section" aria-label="Carrusel de promociones">
  <div class="carousel" id="promoCarousel">
    <div class="carousel__viewport">
      <div class="carousel__track">
        <!-- Cambiá estas imágenes por las tuyas -->
        <article class="carousel__slide">
          <img src="assets/slide-1.jpg" alt="Promo 1" loading="lazy">
          <div class="carousel__caption">
            <h3>Bono de bienvenida</h3>
            <p>Activá en 1 click y empezá a jugar.</p>
          </div>
        </article>

        <article class="carousel__slide">
          <img src="assets/slide-2.jpg" alt="Promo 2" loading="lazy">
          <div class="carousel__caption">
            <h3>Giros gratis</h3>
            <p>Slots seleccionadas con premios.</p>
          </div>
        </article>

        <article class="carousel__slide">
          <img src="assets/slide-3.jpg" alt="Promo 3" loading="lazy">
          <div class="carousel__caption">
            <h3>Cashback</h3>
            <p>Recuperá parte de tu pérdida neta.</p>
          </div>
        </article>
      </div>
    </div>

    <button class="carousel__btn carousel__btn--prev" type="button" aria-label="Anterior">‹</button>
    <button class="carousel__btn carousel__btn--next" type="button" aria-label="Siguiente">›</button>

    <div class="carousel__dots" aria-label="Indicadores"></div>
  </div>
</section>

<style>
  /* ===== Carrusel (responsive, estilo dark + lime) ===== */
  .carousel-section{
    padding: 12px 0 28px;
  }

  .carousel{
    position: relative;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,.08);
    background: linear-gradient(180deg, rgba(18,29,49,.92), rgba(15,24,40,.92));
    box-shadow: 0 16px 48px rgba(0,0,0,.55);
    overflow: hidden;
  }

  .carousel__viewport{
    overflow: hidden;
    border-radius: 22px;
  }

  .carousel__track{
    display: flex;
    width: 100%;
    transform: translateX(0);
    transition: transform 520ms cubic-bezier(.2,.8,.2,1);
    will-change: transform;
  }

  .carousel__slide{
    min-width: 100%;
    position: relative;
    height: clamp(190px, 26vw, 320px);
    isolation: isolate;
  }

  .carousel__slide::before{
    content:"";
    position:absolute;
    inset:0;
    background: radial-gradient(720px 280px at 12% 0%, rgba(189,212,33,.16), transparent 55%);
    z-index: 1;
    pointer-events:none;
  }

  .carousel__slide img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display:block;
    filter: contrast(1.06) saturate(1.08);
  }

  .carousel__caption{
    position: absolute;
    left: 16px;
    bottom: 14px;
    z-index: 2;
    max-width: min(520px, 90%);
    padding: 12px 14px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.35);
    backdrop-filter: blur(6px);
  }

  .carousel__caption h3{
    margin: 0 0 4px;
    font-size: 16px;
    font-weight: 1000;
  }
  .carousel__caption p{
    margin: 0;
    font-size: 13px;
    font-weight: 800;
    color: rgba(233,238,246,.72);
    line-height: 1.35;
  }

  .carousel__btn{
    position:absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(0,0,0,.35);
    color: rgba(233,238,246,.9);
    font-size: 26px;
    font-weight: 1000;
    cursor: pointer;
    z-index: 3;
    display:grid;
    place-items:center;
    transition: transform .12s ease, filter .12s ease, background .12s ease;
    user-select:none;
  }
  .carousel__btn:hover{
    filter: brightness(1.05);
    background: rgba(0,0,0,.45);
  }
  .carousel__btn:active{
    transform: translateY(-50%) scale(0.98);
  }
  .carousel__btn--prev{ left: 10px; }
  .carousel__btn--next{ right: 10px; }

  .carousel__dots{
    position:absolute;
    left: 0;
    right: 0;
    bottom: 10px;
    z-index: 3;
    display:flex;
    gap: 8px;
    justify-content:center;
    align-items:center;
    padding: 6px 10px;
  }

  .carousel__dot{
    width: 9px;
    height: 9px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.18);
    background: rgba(255,255,255,.10);
    cursor:pointer;
    transition: transform .12s ease, background .12s ease, border-color .12s ease;
  }
  .carousel__dot[aria-current="true"]{
    background: #bdd421;
    border-color: rgba(189,212,33,.7);
    transform: scale(1.15);
    box-shadow: 0 0 0 4px rgba(189,212,33,.14);
  }

  @media (max-width: 640px){
    .carousel__btn{ display:none; }
    .carousel__caption{ left: 12px; right: 12px; }
  }

  @media (prefers-reduced-motion: reduce){
    .carousel__track{ transition: none; }
  }
</style>

<script>
  /**
   * Carrusel vanilla: autoplay + swipe + dots + prev/next + teclado.
   */
  (function () {
    const root = document.getElementById("promoCarousel");
    if (!root) return;

    const track = root.querySelector(".carousel__track");
    const slides = Array.from(root.querySelectorAll(".carousel__slide"));
    const prevBtn = root.querySelector(".carousel__btn--prev");
    const nextBtn = root.querySelector(".carousel__btn--next");
    const dotsWrap = root.querySelector(".carousel__dots");

    let index = 0;
    let autoplayId = null;
    const AUTOPLAY_MS = 3800;
    const LOOP = true;

    function clampIndex(i) {
      if (LOOP) return (i + slides.length) % slides.length;
      return Math.max(0, Math.min(i, slides.length - 1));
    }

    function goTo(i, { focusDot = false } = {}) {
      index = clampIndex(i);
      track.style.transform = `translateX(${-index * 100}%)`;
      updateDots();
      if (focusDot) dotsWrap.querySelectorAll("button")[index]?.focus();
    }

    function next() { goTo(index + 1); }
    function prev() { goTo(index - 1); }

    function buildDots() {
      dotsWrap.innerHTML = "";
      slides.forEach((_, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "carousel__dot";
        b.setAttribute("aria-label", `Ir al slide ${i + 1}`);
        b.addEventListener("click", () => goTo(i, { focusDot: true }));
        dotsWrap.appendChild(b);
      });
      updateDots();
    }

    function updateDots() {
      const dots = Array.from(dotsWrap.querySelectorAll(".carousel__dot"));
      dots.forEach((d, i) => d.setAttribute("aria-current", String(i === index)));
    }

    function startAutoplay() {
      stopAutoplay();
      autoplayId = window.setInterval(next, AUTOPLAY_MS);
    }

    function stopAutoplay() {
      if (autoplayId) window.clearInterval(autoplayId);
      autoplayId = null;
    }

    // Pause on hover/focus within (desktop)
    root.addEventListener("mouseenter", stopAutoplay);
    root.addEventListener("mouseleave", startAutoplay);
    root.addEventListener("focusin", stopAutoplay);
    root.addEventListener("focusout", startAutoplay);

    // Buttons
    prevBtn?.addEventListener("click", prev);
    nextBtn?.addEventListener("click", next);

    // Keyboard
    root.setAttribute("tabindex", "0");
    root.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") prev();
      if (e.key === "ArrowRight") next();
    });

    // Swipe (touch)
    let startX = 0;
    let deltaX = 0;
    let isDown = false;

    function onPointerDown(e) {
      isDown = true;
      startX = e.clientX;
      deltaX = 0;
      track.style.transition = "none";
      stopAutoplay();
    }

    function onPointerMove(e) {
      if (!isDown) return;
      deltaX = e.clientX - startX;
      const percent = (deltaX / root.clientWidth) * 100;
      track.style.transform = `translateX(${(-index * 100) + percent}%)`;
    }

    function onPointerUp() {
      if (!isDown) return;
      isDown = false;
      track.style.transition = "";
      const threshold = root.clientWidth * 0.15;

      if (Math.abs(deltaX) > threshold) {
        deltaX < 0 ? next() : prev();
      } else {
        goTo(index);
      }
      startAutoplay();
    }

    root.addEventListener("pointerdown", onPointerDown);
    root.addEventListener("pointermove", onPointerMove);
    root.addEventListener("pointerup", onPointerUp);
    root.addEventListener("pointercancel", onPointerUp);
    root.addEventListener("dragstart", (e) => e.preventDefault());

    // Init
    buildDots();
    goTo(0);
    startAutoplay();
  })();
</script>
